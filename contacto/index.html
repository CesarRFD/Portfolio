:"Resumen y perfil de César Fonseca, programador de videojuegos con experiencia en Unity y Unreal.","home.eyebrow":"Bienvenido","home.title":"Resumen","home.summaryLead":"Mi nombre es","home.summaryBody":"Soy programador de videojuegos con experiencia en Unity y Unreal. Estudié Ingeniería en Programación de Videojuegos en la universidad UNIAT.","home.aboutTitle":"¿Quién soy?","home.aboutLead":"Me gusta trabajar con código, crear lógica compleja y hacer que cada versión sea más","home.aboutTail":"que la anterior.","home.skillsTitle":"Habilidades, tecnologías y software","projects.pageTitle":"Proyectos | César Fonseca","projects.pageDescription":"Portafolio de proyectos completos y demos jugables de César Fonseca.","projects.navAria":"Navegación principal","projects.headline":"Proyectos","projects.workLabel":"¿Cuál fue mi función en este proyecto?","projects.stars.desc1":"Stars Thief es un pequeño juego de desplazamiento lateral creado para una game jam. Juegas como un tierno mapache en el espacio, en busca de sus estrellas.","projects.stars.desc2":"Fue desarrollado en dos días como parte de una game jam universitaria. Es un clásico juego de desplazamiento lateral.","projects.stars.work":"Originalmente solo desarrollé las mecánicas de movimiento del jugador, el sistema de vida y las condiciones de victoria; pero, después de la jam, refactoricé, limpié y mejoré todo el código del proyecto en general. Algunas de las áreas en las que trabajé fueron: sistema de movimiento, luces, menús, parallax scrolling y selector de dificultad.","projects.stars.role1":"Movimiento básico","projects.stars.role2":"Salto dinámico","projects.stars.role3":"Agarre en paredes","projects.stars.role4":"Programación de animaciones","projects.stars.role5":"Iluminación","projects.stars.role6":"Condición de victoria","projects.stars.role7":"Adaptación a móviles y web","projects.apocalypse.desc1":"Mi aporte principal en este proyecto fue desarrollar el combate base con oleadas, enemigos y feedback visual durante la partida.","projects.apocalypse.desc2":"Fue creado como una propuesta de game jam con enfoque arcade, donde cada encuentro busca sentirse rápido, agresivo y fácil de leer.","projects.apocalypse.work":"En este proyecto tuve un rol de liderazgo y asignación de tareas para mis compañeros de equipo. Marqué el rumbo de la jugabilidad y dejé que mis compañeros se enfocaran en la parte artística y el trasfondo del proyecto. En programación, desarrollé el movimiento, el sistema de oleadas, los enemigos, el sistema de daño y el balance de dificultad.","projects.apocalypse.role1":"Sistema de oleadas","projects.apocalypse.role2":"IA de enemigos","projects.apocalypse.role3":"Sistema de daño","projects.apocalypse.role4":"Juice y feedback","projects.apocalypse.role5":"Balance de dificultad","projects.apocalypse.role6":"Iteración del gameplay","projects.fizzy.desc1":"Un juego de puzles con una atmósfera amable en el que exploré el diseño de niveles, las interacciones con burbujas y distintas herramientas para apoyar la experiencia.","projects.fizzy.desc2":"El proyecto fue desarrollado en una game jam, priorizando una identidad visual clara, una progresión sencilla y una sensación relajada al jugar.","projects.fizzy.work":"En este proyecto tuve un rol puramente de programación. Me encargué de las mecánicas de salto, las interfaces, el movimiento y las físicas en general.","projects.fizzy.role1":"Flujo de puzles","projects.fizzy.role2":"Sistema de burbujas","projects.fizzy.role3":"Diseño de niveles","projects.fizzy.role4":"Interfaz y objetivos","projects.fizzy.role5":"Ajustes de colisión","contact.pageTitle":"Contacto | César Fonseca","contact.pageDescription":"Información de contacto de César Fonseca: WhatsApp, LinkedIn, Instagram y correo.","contact.title":"Contacto","contact.subtitle":"Puedes contactarme directamente por los siguientes medios:","contact.emailLead":"También puedes escribirme por correo si lo prefieres."},"en":{"common.languageLabel":"Language","common.languageSwitcher":"Language switcher","common.navHome":"Profile","common.navContact":"Contact","common.cvButton":"View my CV","common.cvFile":"CVIngles.pdf","common.projectsButton":"View my projects","common.backToProjects":"Back to projects","common.code":"Code","home.pageTitle":"Profile | César Fonseca","home.pageDescription":"Profile and background of César Fonseca, a game programmer with experience in Unity and Unreal.","home.eyebrow":"Welcome","home.title":"Profile","home.summaryLead":"My name is","home.summaryBody":"I am a game programmer with experience in Unity and Unreal. I studied Video Game Programming Engineering at UNIAT.","home.aboutTitle":"Who am I?","home.aboutLead":"I enjoy working with code, building complex logic, and making each version more","home.aboutTail":"than the last one.","home.skillsTitle":"Skills, technologies, and software","projects.pageTitle":"Projects | César Fonseca","projects.pageDescription":"Portfolio of completed projects and playable demos by César Fonseca.","projects.navAria":"Main navigation","projects.headline":"Projects","projects.workLabel":"What was my role in this project?","projects.stars.desc1":"Stars Thief is a small side-scrolling game created for a game jam. You play as an adorable raccoon in space, searching for its stars.","projects.stars.desc2":"It was developed in two days as part of a university game jam. It is a classic side-scrolling game.","projects.stars.work":"Originally, I only worked on the player movement mechanics, the health system, and the victory conditions, but after the jam I refactored, cleaned up, and improved the project codebase as a whole. Some of the areas I worked on include the movement system, lighting, menus, parallax scrolling, and the difficulty selector.","projects.stars.role1":"Basic movement","projects.stars.role2":"Dynamic jump","projects.stars.role3":"Wall grabbing","projects.stars.role4":"Animation programming","projects.stars.role5":"Lighting","projects.stars.role6":"Victory condition","projects.stars.role7":"Mobile and web port","projects.apocalypse.desc1":"My main contribution to this project was building the core combat loop with waves, enemies, and visual feedback during gameplay.","projects.apocalypse.desc2":"It was created as a game jam concept with an arcade focus, where every encounter aims to feel fast, aggressive, and easy to read.","projects.apocalypse.work":"In this project, I took on a leadership role and helped assign tasks to my teammates. I set the gameplay direction and let my teammates focus on the artistic side and the project lore. On the programming side, I developed the movement, wave system, enemies, damage system, and difficulty balancing.","projects.apocalypse.role1":"Wave system","projects.apocalypse.role2":"Enemy AI","projects.apocalypse.role3":"Damage system","projects.apocalypse.role4":"Juice and feedback","projects.apocalypse.role5":"Difficulty balancing","projects.apocalypse.role6":"Gameplay iteration","projects.fizzy.desc1":"A puzzle game with a friendly atmosphere where I explored level design, bubble-based interactions, and tools that support the overall experience.","projects.fizzy.desc2":"The project was developed during a game jam, prioritizing a clear visual identity, straightforward progression, and a relaxing feel.","projects.fizzy.work":"In this project, I had a purely programming-focused role. I was responsible for the jump mechanics, UI, movement, and the overall physics.","projects.fizzy.role1":"Puzzle flow","projects.fizzy.role2":"Bubble system","projects.fizzy.role3":"Level design","projects.fizzy.role4":"UI and objectives","projects.fizzy.role5":"Collision tuning","contact.pageTitle":"Contact | César Fonseca","contact.pageDescription":"Contact information for César Fonseca: WhatsApp, LinkedIn, Instagram, and email.","contact.title":"Contact","contact.subtitle":"You can reach me directly through the following channels:","contact.emailLead":"You can also email me if you prefer."},"de":{"common.languageLabel":"Sprache","common.languageSwitcher":"Sprachauswahl","common.navHome":"Profil","common.navContact":"Kontakt","common.cvButton":"Lebenslauf ansehen","common.cvFile":"CVAleman.pdf","common.projectsButton":"Meine Projekte ansehen","common.backToProjects":"Zurück zu den Projekten","common.code":"Quellcode","home.pageTitle":"Profil | César Fonseca","home.pageDescription":"Profil und Hintergrund von César Fonseca, Game Programmer mit Erfahrung in Unity und Unreal.","home.eyebrow":"Willkommen","home.title":"Profil","home.summaryLead":"Ich heiße","home.summaryBody":"Ich bin Game Programmer mit Erfahrung in Unity und Unreal. An der UNIAT habe ich Videospielprogrammierung studiert.","home.aboutTitle":"Wer bin ich?","home.aboutLead":"Ich arbeite gern mit Code, entwickle komplexe Logik und sorge dafür, dass jede Version","home.aboutTail":"sauberer ist als die vorherige.","home.skillsTitle":"Fähigkeiten, Technologien und Software","projects.pageTitle":"Projekte | César Fonseca","projects.pageDescription":"Portfolio mit abgeschlossenen Projekten und spielbaren Demos von César Fonseca.","projects.navAria":"Hauptnavigation","projects.headline":"Projekte","projects.workLabel":"Was war meine Rolle in diesem Projekt?","projects.stars.desc1":"Stars Thief ist ein kleines Side-Scrolling-Spiel, das für eine Game Jam entstanden ist. Du spielst einen niedlichen Waschbären im Weltraum, der seine Sterne sucht.","projects.stars.desc2":"Es wurde in zwei Tagen im Rahmen einer universitären Game Jam entwickelt. Es ist ein klassisches Side-Scrolling-Spiel.","projects.stars.work":"Ursprünglich habe ich nur die Bewegungsmechaniken des Spielers, das Lebenssystem und die Siegbedingungen umgesetzt. Nach der Jam habe ich jedoch den gesamten Code des Projekts refaktoriert, bereinigt und verbessert. Zu den Bereichen, an denen ich gearbeitet habe, gehören unter anderem das Bewegungssystem, die Beleuchtung, Menüs, Parallax-Scrolling und die Schwierigkeitsauswahl.","projects.stars.role1":"Grundbewegung","projects.stars.role2":"Dynamischer Sprung","projects.stars.role3":"Wandgriff","projects.stars.role4":"Animationsprogrammierung","projects.stars.role5":"Beleuchtung","projects.stars.role6":"Siegbedingung","projects.stars.role7":"Portierung auf Mobile und Web","projects.apocalypse.desc1":"Mein Hauptbeitrag bei diesem Projekt war die Entwicklung des grundlegenden Kampfsystems mit Wellen, Gegnern und visuellem Feedback während des Spiels.","projects.apocalypse.desc2":"Es entstand als Game-Jam-Idee mit Arcade-Fokus, bei der sich jede Begegnung schnell, aggressiv und klar lesbar anfühlen soll.","projects.apocalypse.work":"In diesem Projekt übernahm ich eine Führungsrolle und half bei der Aufgabenverteilung im Team. Ich gab die Richtung für das Gameplay vor und ließ meine Teamkollegen sich auf den künstlerischen Teil und die Lore des Projekts konzentrieren. Auf der Programmierseite entwickelte ich die Bewegung, das Wellensystem, die Gegner, das Schadenssystem und das Schwierigkeitsbalancing.","projects.apocalypse.role1":"Wellen-System","projects.apocalypse.role2":"Gegner-KI","projects.apocalypse.role3":"Schadenssystem","projects.apocalypse.role4":"Juice und Feedback","projects.apocalypse.role5":"Schwierigkeitsbalancing","projects.apocalypse.role6":"Gameplay-Iteration","projects.fizzy.desc1":"Ein Puzzle-Spiel mit freundlicher Atmosphäre, in dem ich Leveldesign, Interaktionen mit Blasen und Werkzeuge zur Unterstützung des Spielerlebnisses erkundet habe.","projects.fizzy.desc2":"Das Projekt wurde im Rahmen einer Game Jam entwickelt und legt Wert auf eine klare visuelle Identität, eine einfache Progression und ein entspanntes Spielgefühl.","projects.fizzy.work":"In diesem Projekt hatte ich eine rein programmierungsbezogene Rolle. Ich war für die Sprungmechaniken, die Benutzeroberfläche, die Bewegung und die allgemeine Physik verantwortlich.","projects.fizzy.role1":"Puzzle-Flow","projects.fizzy.role2":"Blasen-System","projects.fizzy.role3":"Leveldesign","projects.fizzy.role4":"UI und Ziele","projects.fizzy.role5":"Kollisions-Feinschliff","contact.pageTitle":"Kontakt | César Fonseca","contact.pageDescription":"Kontaktinformationen von César Fonseca: WhatsApp, LinkedIn, Instagram und E-Mail.","contact.title":"Kontakt","contact.subtitle":"Du kannst mich direkt über die folgenden Kanäle kontaktieren:","contact.emailLead":"Wenn du lieber per E-Mail schreibst, kannst du mich auch dort erreichen."}}</script> <script>
	(() => {
		const init = () => {
			const translationsNode = document.getElementById('site-translations');
			if (!translationsNode) return;

			const translations = JSON.parse(translationsNode.textContent || '{}');
			const supportedLanguages = ['es', 'en', 'de'];
			const storageKey = 'portfolio-language';
			const body = document.body;
			const buttons = Array.from(document.querySelectorAll('[data-language-option]'));
			const metaKeys = {
				home: {
					title: 'home.pageTitle',
					description: 'home.pageDescription',
				},
				projects: {
					title: 'projects.pageTitle',
					description: 'projects.pageDescription',
				},
				contact: {
					title: 'contact.pageTitle',
					description: 'contact.pageDescription',
				},
			};

			const applyAttributeTranslations = (dict) => {
				document.querySelectorAll('[data-i18n-attr]').forEach((element) => {
					const mappings = (element.getAttribute('data-i18n-attr') || '')
						.split(';')
						.map((entry) => entry.trim())
						.filter(Boolean);

					mappings.forEach((mapping) => {
						const [attribute, key] = mapping.split(':');
						if (!attribute || !key || !(key in dict)) return;
						element.setAttribute(attribute, dict[key]);
					});
				});
			};

			const applyTextTranslations = (dict) => {
				document.querySelectorAll('[data-i18n]').forEach((element) => {
					const key = element.getAttribute('data-i18n');
					if (!key || !(key in dict)) return;
					element.textContent = dict[key];
				});
			};

			const applyHrefTranslations = (dict) => {
				document.querySelectorAll('[data-i18n-href]').forEach((element) => {
					const key = element.getAttribute('data-i18n-href');
					const base = element.getAttribute('data-i18n-base') || '';
					if (!key || !(key in dict)) return;
					element.setAttribute('href', `${base}${dict[key]}`);
				});
			};

			const getStoredLanguage = () => {
				try {
					return localStorage.getItem(storageKey);
				} catch {
					return null;
				}
			};

			const saveLanguage = (lang) => {
				try {
					localStorage.setItem(storageKey, lang);
				} catch {
					/* noop */
				}
			};

			const applyLanguage = (lang) => {
				const nextLang = supportedLanguages.includes(lang) ? lang : 'es';
				const dict = translations[nextLang] || translations.es || {};
				const pageKey = body.dataset.page;
				const meta = metaKeys[pageKey];
				const descriptionTag = document.querySelector('meta[name="description"]');

				document.documentElement.lang = nextLang;
				applyTextTranslations(dict);
				applyAttributeTranslations(dict);
				applyHrefTranslations(dict);

				if (meta) {
					if (dict[meta.title]) {
						document.title = dict[meta.title];
					}

					if (descriptionTag && dict[meta.description]) {
						descriptionTag.setAttribute('content', dict[meta.description]);
					}
				}

				buttons.forEach((button) => {
					const isActive = button.getAttribute('data-language-option') === nextLang;
					button.classList.toggle('is-active', isActive);
					button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
				});

				saveLanguage(nextLang);
			};

			buttons.forEach((button) => {
				button.addEventListener('click', () => {
					applyLanguage(button.getAttribute('data-language-option') || 'es');
				});
			});

			applyLanguage(getStoredLanguage() || 'es');
		};

		if (document.readyState === 'loading') {
			document.addEventListener('DOMContentLoaded', init, { once: true });
		} else {
			init();
		}
